# Goal: I have to lint, build, test the code for frontend and backend, and then push the images to Dockerhub. 

name: CI

on:
  push:
    branches: [master]

jobs: 
    frontend: 
        # GitHub Runner
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout code
              uses: actions/checkout@v2
            - name: Setup Node.js
              uses: actions/setup-node@v2
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: frontend/package-lock.json
            - name: Install packages
              run: npm install
            - name: Lint code
              run: npm run lint
            - name: Run tests
              run: npm test
